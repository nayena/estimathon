<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimathon — Scoring Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #f4f2f7;
  --bg-card: #ffffff;
  --bg-card-hover: #f0eef5;
  --bg-input: #f0edf6;
  --border: #ddd8e8;
  --border-focus: #6c5ce7;
  --text-primary: #1a1a2e;
  --text-secondary: #5a5870;
  --text-muted: #8a88a0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.25);
  --good: #16a34a;
  --good-bg: rgba(22, 163, 74, 0.08);
  --bad: #dc2626;
  --bad-bg: rgba(220, 38, 38, 0.06);
  --gold: #b8860b;
  --gold-bg: rgba(184, 134, 11, 0.1);
  --silver: #6b7280;
  --silver-bg: rgba(107, 114, 128, 0.08);
  --bronze: #a0522d;
  --bronze-bg: rgba(160, 82, 45, 0.08);
  --timer-active: #16a34a;
  --timer-warn: #d97706;
  --timer-danger: #dc2626;
  --radius: 8px;
  --radius-lg: 14px;
}

html { font-size: 15px; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108, 92, 231, 0.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(108, 92, 231, 0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ─── LAYOUT ─── */
.app { position: relative; z-index: 1; }
.hidden { display: none !important; }

.header {
  text-align: center;
  padding: 2rem 1rem 1rem;
  position: relative;
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #2d2b55 0%, #6c5ce7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 500;
}

.mode-badge {
  display: inline-block;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  margin-top: 0.5rem;
}
.mode-badge.admin { background: rgba(108, 92, 231, 0.12); color: var(--accent); }
.mode-badge.player { background: var(--good-bg); color: var(--good); }

/* ─── SETUP SCREEN ─── */
.setup-screen {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

.setup-screen h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 0.3rem;
  background: linear-gradient(135deg, #2d2b55, #6c5ce7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.setup-screen .setup-sub {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
}

.setup-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
}

.setup-card label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.3rem;
  margin-top: 0.8rem;
}
.setup-card label:first-child { margin-top: 0; }

.setup-card input, .setup-card textarea {
  width: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.5rem 0.7rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.setup-card input:focus, .setup-card textarea:focus { border-color: var(--accent); }

.setup-card textarea {
  height: 120px;
  resize: vertical;
}

.setup-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.2rem;
}

.setup-hint {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 1rem;
  line-height: 1.6;
  text-align: center;
}

.setup-hint a { color: var(--accent); text-decoration: none; }
.setup-hint a:hover { text-decoration: underline; }

.setup-hint code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  background: var(--bg-input);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
}

.setup-error {
  font-size: 0.75rem;
  color: var(--bad);
  margin-top: 0.5rem;
  display: none;
}

/* ─── TIMER ─── */
.timer-section {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  flex-wrap: wrap;
}

.timer-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-primary);
  transition: color 0.5s;
  min-width: 220px;
  text-align: center;
  position: relative;
}

.timer-display.running { color: var(--timer-active); text-shadow: 0 0 20px rgba(22, 163, 74, 0.2); }
.timer-display.warning { color: var(--timer-warn); text-shadow: 0 0 20px rgba(217, 119, 6, 0.2); }
.timer-display.danger { color: var(--timer-danger); text-shadow: 0 0 20px rgba(220, 38, 38, 0.25); animation: pulse-danger 1s ease-in-out infinite; }

@keyframes pulse-danger {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.timer-controls { display: flex; gap: 0.5rem; }

.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.55rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.btn:hover { background: var(--bg-card-hover); border-color: var(--border-focus); }
.btn:active { transform: scale(0.97); }

.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-accent:hover { background: #5a4bd6; border-color: #5a4bd6; box-shadow: 0 4px 14px var(--accent-glow); }

.btn-danger { border-color: var(--bad); color: var(--bad); }
.btn-danger:hover { background: var(--bad-bg); }

.btn-reveal {
  background: linear-gradient(135deg, #6c5ce7, #a855f7);
  border: none;
  color: #fff;
  font-size: 1rem;
  padding: 0.8rem 2.5rem;
  border-radius: var(--radius-lg);
  letter-spacing: 0.1em;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.btn-reveal:hover { box-shadow: 0 6px 30px rgba(108, 92, 231, 0.35); transform: translateY(-1px); }
.btn-reveal::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  animation: shimmer 3s infinite;
}
@keyframes shimmer { 100% { transform: translateX(100%); } }

/* ─── TABS ─── */
.tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 0 1rem;
  margin-bottom: 1rem;
}

.tab {
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.65rem 1.5rem;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.tab:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.tab:not(:last-child) { border-right: none; }
.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.tab:hover:not(.active) { background: var(--bg-card-hover); }

/* single tab (player mode) */
.tabs .tab:only-child {
  border-radius: var(--radius);
}

/* ─── PANELS ─── */
.panel { display: none; padding: 0 1rem 2rem; max-width: 1500px; margin: 0 auto; }
.panel.active { display: block; }

/* ─── ADMIN: ANSWERS ─── */
.section-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
  padding-left: 0.2rem;
}

.answers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.6rem;
  margin-bottom: 2rem;
}

.answer-cell {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.5rem 0.7rem;
}

.answer-cell label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 24px;
}

.answer-cell input {
  flex: 1;
  min-width: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 0.4rem 0.5rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}

.answer-cell input:focus { border-color: var(--accent); }
.answer-cell input::placeholder { color: var(--text-muted); }

/* ─── ADMIN: TEAM INTERVALS ─── */
.team-admin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
}

.team-admin-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.8rem;
  cursor: pointer;
  user-select: none;
}

.team-admin-header .team-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--accent);
  background: rgba(108, 92, 231, 0.12);
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
  min-width: 20px;
  text-align: center;
}

.team-admin-header .team-name-input {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 0.3rem 0.5rem;
  color: var(--text-primary);
  outline: none;
  flex: 1;
  min-width: 0;
}
.team-admin-header .team-name-input:focus { border-color: var(--border); background: var(--bg-input); }

.team-admin-header .collapse-icon {
  font-size: 0.8rem;
  color: var(--text-muted);
  transition: transform 0.3s;
}
.team-admin-card.collapsed .collapse-icon { transform: rotate(-90deg); }
.team-admin-card.collapsed .team-intervals-grid { display: none; }

.team-intervals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.5rem;
}

.interval-cell {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0;
}

.interval-cell .prob-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 22px;
}

.interval-cell input {
  width: 72px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 0.35rem 0.4rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.interval-cell input:focus { border-color: var(--accent); }
.interval-cell input::placeholder { color: var(--text-muted); font-size: 0.7rem; }

.interval-cell .sep {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
}

.interval-cell .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.interval-cell .status-dot.good { background: var(--good); box-shadow: 0 0 6px rgba(22, 163, 74, 0.4); }
.interval-cell .status-dot.bad { background: var(--bad); box-shadow: 0 0 6px rgba(220, 38, 38, 0.35); }

/* ─── SCOREBOARD ─── */
.scoreboard-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-card);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
}

.scoreboard {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  min-width: 900px;
}

/* Player mode: simpler scoreboard */
.scoreboard.player-view { min-width: 400px; }

.scoreboard thead th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.7rem 0.5rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-card);
  text-align: center;
  white-space: nowrap;
}

.scoreboard thead th:first-child,
.scoreboard thead th:nth-child(2) {
  text-align: left;
  padding-left: 1rem;
}

.scoreboard tbody tr {
  border-bottom: 1px solid rgba(221, 216, 232, 0.6);
  transition: background 0.2s;
}
.scoreboard tbody tr:hover { background: var(--bg-card-hover); }
.scoreboard tbody tr:last-child { border-bottom: none; }

.scoreboard td {
  padding: 0.55rem 0.5rem;
  text-align: center;
  vertical-align: middle;
  white-space: nowrap;
}

.scoreboard td:first-child { padding-left: 1rem; text-align: left; }
.scoreboard td:nth-child(2) { text-align: left; }

.rank-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: var(--bg-input);
  color: var(--text-secondary);
}

.rank-1 .rank-badge { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(184, 134, 11, 0.3); }
.rank-2 .rank-badge { background: var(--silver-bg); color: var(--silver); border: 1px solid rgba(107, 114, 128, 0.25); }
.rank-3 .rank-badge { background: var(--bronze-bg); color: var(--bronze); border: 1px solid rgba(160, 82, 45, 0.25); }

.rank-1 { background: var(--gold-bg) !important; }
.rank-2 { background: var(--silver-bg) !important; }
.rank-3 { background: var(--bronze-bg) !important; }

.team-name-cell {
  font-weight: 600;
  font-size: 0.85rem;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.prob-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-secondary);
  line-height: 1.4;
}
.prob-cell .interval-display { display: block; }
.prob-cell .result-icon { font-size: 0.75rem; }

.good-count {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--good);
}

.score-cell {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 800;
  font-size: 1rem;
  color: var(--text-primary);
}

.rank-1 .score-cell { color: var(--gold); }
.rank-2 .score-cell { color: var(--silver); }
.rank-3 .score-cell { color: var(--bronze); }

/* ─── REVEAL OVERLAY ─── */
.reveal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.reveal-overlay.active { display: flex; }

.reveal-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 800;
  background: linear-gradient(135deg, #2d2b55, #6c5ce7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s forwards;
}

.reveal-list {
  list-style: none;
  width: 100%;
  max-width: 600px;
}

.reveal-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem 1.2rem;
  margin-bottom: 0.5rem;
  border-radius: var(--radius);
  background: var(--bg-card);
  border: 1px solid var(--border);
  opacity: 0;
  transform: translateY(20px);
}

.reveal-item .reveal-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem;
  font-weight: 800;
  min-width: 36px;
  text-align: center;
  color: var(--text-muted);
}

.reveal-item .reveal-name {
  flex: 1;
  font-weight: 600;
  font-size: 1.1rem;
}

.reveal-item .reveal-score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-secondary);
}

.reveal-item.rank-1 { border-color: rgba(184, 134, 11, 0.4); background: var(--gold-bg); }
.reveal-item.rank-1 .reveal-rank { color: var(--gold); }
.reveal-item.rank-1 .reveal-score { color: var(--gold); }

.reveal-item.rank-2 { border-color: rgba(107, 114, 128, 0.3); }
.reveal-item.rank-2 .reveal-rank { color: var(--silver); }

.reveal-item.rank-3 { border-color: rgba(160, 82, 45, 0.3); }
.reveal-item.rank-3 .reveal-rank { color: var(--bronze); }

.reveal-close {
  margin-top: 2rem;
  opacity: 0;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ─── SCORE FORMULA DISPLAY ─── */
.formula-bar {
  text-align: center;
  padding: 0.6rem 1rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  border-bottom: 1px solid rgba(221, 216, 232, 0.5);
}
.formula-bar span { color: var(--accent); }

/* ─── CONNECTION STATUS ─── */
.connection-bar {
  text-align: center;
  padding: 0.3rem;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all 0.3s;
}
.connection-bar.connected { background: var(--good-bg); color: var(--good); }
.connection-bar.disconnected { background: var(--bad-bg); color: var(--bad); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  html { font-size: 14px; }
  .answers-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .team-intervals-grid { grid-template-columns: 1fr 1fr; }
  .tabs { gap: 0; }
  .tab { padding: 0.55rem 0.8rem; font-size: 0.7rem; }
  .timer-section { gap: 0.6rem; }
}

@media (max-width: 480px) {
  .team-intervals-grid { grid-template-columns: 1fr; }
  .interval-cell input { width: 60px; }
}

/* ─── UTILITY ─── */
.mt-1 { margin-top: 1rem; }
.mb-1 { margin-bottom: 1rem; }
.text-center { text-align: center; }
.flex-center { display: flex; align-items: center; justify-content: center; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b0adbe; }

/* number input arrows hide */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<!-- ════════════ SETUP SCREEN ════════════ -->
<div class="setup-screen" id="setupScreen">
  <h2>ESTIMATHON</h2>
  <p class="setup-sub">Real-time Scoring Dashboard</p>

  <div class="setup-card">
    <label>Room Name</label>
    <input type="text" id="setupRoom" placeholder="e.g. estimathon-2026" value="">

    <div class="setup-error" id="setupError"></div>

    <div class="setup-actions">
      <button class="btn btn-accent" style="flex:1" onclick="connectFirebase('admin')">Join as Admin</button>
      <button class="btn" style="flex:1" onclick="connectFirebase('player')">Join as Player</button>
    </div>
  </div>
</div>

<!-- ════════════ MAIN APP ════════════ -->
<div class="app hidden" id="mainApp">

  <!-- CONNECTION STATUS -->
  <div class="connection-bar connected" id="connectionBar">Connected</div>

  <!-- HEADER -->
  <header class="header">
    <h1>ESTIMATHON</h1>
    <p class="subtitle">Scoring Dashboard</p>
    <div class="mode-badge" id="modeBadge"></div>
  </header>

  <!-- TIMER -->
  <section class="timer-section">
    <div class="timer-display" id="timerDisplay">30:00</div>
    <div class="timer-controls" id="timerControls">
      <button class="btn btn-accent" id="btnStart" onclick="toggleTimer()">Start</button>
      <button class="btn btn-danger" id="btnReset" onclick="resetTimer()">Reset</button>
    </div>
  </section>

  <!-- FORMULA -->
  <div class="formula-bar">
    Score = <span>(10 + Σ⌊max/min⌋)</span> × <span>2^(13 − good)</span> · lowest wins
  </div>

  <!-- TABS -->
  <div class="tabs mt-1" id="tabsContainer">
    <button class="tab active" onclick="switchTab('scoreboard')">Scoreboard</button>
    <button class="tab" id="adminTab" onclick="switchTab('admin')">Admin</button>
  </div>

  <!-- SCOREBOARD PANEL -->
  <div class="panel active" id="panel-scoreboard">
    <div class="text-center mb-1">
      <button class="btn-reveal" onclick="revealScores()">✦ Reveal Final Rankings ✦</button>
    </div>
    <div class="scoreboard-wrapper">
      <table class="scoreboard" id="scoreboardTable">
        <thead id="scoreboardHead">
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th><th>P7</th>
            <th>P8</th><th>P9</th><th>P10</th><th>P11</th><th>P12</th><th>P13</th>
            <th>Good</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="scoreboardBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="panel" id="panel-admin">
    <div class="section-title">Correct Answers</div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="section-title">Team Submissions</div>
    <div id="teamAdminCards"></div>
  </div>

</div>

<!-- REVEAL OVERLAY -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-title">Final Rankings</div>
  <ol class="reveal-list" id="revealList"></ol>
  <button class="btn reveal-close" id="revealCloseBtn" onclick="closeReveal()">Close</button>
</div>

<!-- ════════════ FIREBASE SDK ════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ─── CONSTANTS ───
const NUM_PROBLEMS = 13;
const NUM_TEAMS = 10;
const TIMER_SECONDS = 30 * 60;

// ─── APP STATE ───
let MODE = 'admin'; // 'admin' or 'player'
let db = null;      // Firebase database ref
let roomRef = null; // Reference to our room
let localTimerInterval = null; // local display ticker

const state = {
  answers: new Array(NUM_PROBLEMS).fill(null),
  teams: [],
  timer: { endTime: null, running: false, remainingSeconds: TIMER_SECONDS }
};

for (let t = 0; t < NUM_TEAMS; t++) {
  state.teams.push({
    name: `Team ${t + 1}`,
    intervals: new Array(NUM_PROBLEMS).fill(null)
  });
}

// ─── FIREBASE CONFIG (hardcoded) ───
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD7ORtwxmxdzgZjnBE-Nlap-0DLdi0vEAk",
  authDomain: "estimathon-39e2d.firebaseapp.com",
  databaseURL: "https://estimathon-39e2d-default-rtdb.firebaseio.com",
  projectId: "estimathon-39e2d",
  storageBucket: "estimathon-39e2d.firebasestorage.app",
  messagingSenderId: "919380022049",
  appId: "1:919380022049:web:73c9f5ba533cd680db2460",
  measurementId: "G-SJBBZC7ML2"
};

// ─── SETUP & FIREBASE CONNECTION ───

// Restore saved room
try {
  const savedRoom = localStorage.getItem('estimathon_room');
  if (savedRoom) document.getElementById('setupRoom').value = savedRoom;
} catch(e) {}

function connectFirebase(mode) {
  const errEl = document.getElementById('setupError');
  errEl.style.display = 'none';

  const room = document.getElementById('setupRoom').value.trim() || 'default';

  // Save room for next time
  localStorage.setItem('estimathon_room', room);

  MODE = mode;

  // Initialize Firebase
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    db = firebase.database();
    roomRef = db.ref('rooms/' + room);
  } catch(e) {
    errEl.textContent = 'Firebase init failed: ' + e.message;
    errEl.style.display = 'block';
    return;
  }

  // Show main app
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');

  // Configure mode
  const badge = document.getElementById('modeBadge');
  if (MODE === 'player') {
    badge.textContent = 'Player View';
    badge.className = 'mode-badge player';
    document.getElementById('adminTab').classList.add('hidden');
    document.getElementById('timerControls').classList.add('hidden');
    // Player scoreboard: hide intervals, show only rank/name/good/score
    renderPlayerScoreboardHead();
  } else {
    badge.textContent = 'Admin';
    badge.className = 'mode-badge admin';
  }

  // Listen for connection status
  db.ref('.info/connected').on('value', snap => {
    const bar = document.getElementById('connectionBar');
    if (snap.val() === true) {
      bar.textContent = 'Connected';
      bar.className = 'connection-bar connected';
    } else {
      bar.textContent = 'Disconnected — Reconnecting...';
      bar.className = 'connection-bar disconnected';
    }
  });

  // Subscribe to data
  subscribeToFirebase();

  // Render admin UI (only for admin mode)
  if (MODE === 'admin') {
    renderAnswersGrid();
    renderTeamCards();
  }

  renderScoreboard();
  startLocalTimerTick();
}

// ─── FIREBASE SUBSCRIPTIONS ───

function subscribeToFirebase() {
  // Listen: answers
  roomRef.child('answers').on('value', snap => {
    const data = snap.val();
    for (let p = 0; p < NUM_PROBLEMS; p++) {
      state.answers[p] = (data && data[p] !== undefined && data[p] !== null) ? data[p] : null;
    }
    if (MODE === 'admin') {
      // Update answer inputs without re-rendering (avoid losing focus)
      for (let p = 0; p < NUM_PROBLEMS; p++) {
        const el = document.getElementById(`ans-${p}`);
        if (el && el !== document.activeElement) {
          el.value = state.answers[p] !== null ? state.answers[p] : '';
        }
      }
      updateAllStatusDots();
    }
    renderScoreboard();
  });

  // Listen: teams
  roomRef.child('teams').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    for (let t = 0; t < NUM_TEAMS; t++) {
      if (data[t]) {
        if (data[t].name) state.teams[t].name = data[t].name;
        for (let p = 0; p < NUM_PROBLEMS; p++) {
          if (data[t].intervals && data[t].intervals[p]) {
            state.teams[t].intervals[p] = {
              min: data[t].intervals[p].min ?? null,
              max: data[t].intervals[p].max ?? null
            };
            // Clean up if both null
            if (state.teams[t].intervals[p].min === null && state.teams[t].intervals[p].max === null) {
              state.teams[t].intervals[p] = null;
            }
          } else {
            state.teams[t].intervals[p] = null;
          }
        }
      }
    }
    if (MODE === 'admin') {
      // Update inputs without re-rendering
      for (let t = 0; t < NUM_TEAMS; t++) {
        const nameEl = document.querySelector(`#team-card-${t} .team-name-input`);
        if (nameEl && nameEl !== document.activeElement) {
          nameEl.value = state.teams[t].name;
        }
        for (let p = 0; p < NUM_PROBLEMS; p++) {
          const minEl = document.getElementById(`int-${t}-${p}-min`);
          const maxEl = document.getElementById(`int-${t}-${p}-max`);
          const interval = state.teams[t].intervals[p];
          if (minEl && minEl !== document.activeElement) {
            minEl.value = interval && interval.min !== null ? interval.min : '';
          }
          if (maxEl && maxEl !== document.activeElement) {
            maxEl.value = interval && interval.max !== null ? interval.max : '';
          }
        }
      }
      updateAllStatusDots();
    }
    renderScoreboard();
  });

  // Listen: timer
  roomRef.child('timer').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    state.timer.running = !!data.running;
    state.timer.endTime = data.endTime || null;
    state.timer.remainingSeconds = data.remainingSeconds ?? TIMER_SECONDS;

    if (MODE === 'admin') {
      document.getElementById('btnStart').textContent = state.timer.running ? 'Pause' : 'Start';
    }
  });
}

// ─── FIREBASE WRITES ───

function fbSetAnswer(probIdx, val) {
  roomRef.child('answers/' + probIdx).set(val);
}

function fbSetInterval(teamIdx, probIdx, interval) {
  if (interval) {
    roomRef.child(`teams/${teamIdx}/intervals/${probIdx}`).set(interval);
  } else {
    roomRef.child(`teams/${teamIdx}/intervals/${probIdx}`).remove();
  }
}

function fbSetTeamName(teamIdx, name) {
  roomRef.child(`teams/${teamIdx}/name`).set(name);
}

function fbSetTimer(timerData) {
  roomRef.child('timer').set(timerData);
}

// ─── TIMER (SYNCED) ───

function getTimerSeconds() {
  if (state.timer.running && state.timer.endTime) {
    const now = Date.now();
    const remaining = Math.max(0, Math.ceil((state.timer.endTime - now) / 1000));
    return remaining;
  }
  return state.timer.remainingSeconds;
}

function startLocalTimerTick() {
  if (localTimerInterval) clearInterval(localTimerInterval);
  localTimerInterval = setInterval(updateTimerDisplay, 250);
  updateTimerDisplay();
}

function toggleTimer() {
  if (MODE !== 'admin') return;
  const secs = getTimerSeconds();

  if (state.timer.running) {
    // Pause
    fbSetTimer({ running: false, endTime: null, remainingSeconds: secs });
  } else {
    // Start
    if (secs <= 0) return;
    const endTime = Date.now() + secs * 1000;
    fbSetTimer({ running: true, endTime: endTime, remainingSeconds: secs });
  }
}

function resetTimer() {
  if (MODE !== 'admin') return;
  fbSetTimer({ running: false, endTime: null, remainingSeconds: TIMER_SECONDS });
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  if (!el) return;
  const secs = getTimerSeconds();
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  el.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

  el.classList.remove('running', 'warning', 'danger');
  if (secs <= 0) {
    el.classList.add('danger');
  } else if (secs <= 300) {
    el.classList.add('danger');
  } else if (secs <= 600) {
    el.classList.add('warning');
  } else if (state.timer.running) {
    el.classList.add('running');
  }
}

// ─── TABS ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (name === 'scoreboard' && i === 0) || (name === 'admin' && i === 1));
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'scoreboard') renderScoreboard();
}

// ─── SCORE CALCULATION ───
function calcTeamScore(teamIdx) {
  const team = state.teams[teamIdx];
  let goodCount = 0;
  let sumRatio = 0;

  for (let p = 0; p < NUM_PROBLEMS; p++) {
    const interval = team.intervals[p];
    const answer = state.answers[p];
    if (interval && answer !== null && interval.min !== null && interval.max !== null) {
      const { min, max } = interval;
      if (min <= answer && answer <= max) {
        goodCount++;
        sumRatio += Math.floor(max / min);
      }
    }
  }

  const score = (10 + sumRatio) * Math.pow(2, NUM_PROBLEMS - goodCount);
  return { goodCount, score };
}

function isGood(teamIdx, probIdx) {
  const interval = state.teams[teamIdx].intervals[probIdx];
  const answer = state.answers[probIdx];
  if (!interval || answer === null || interval.min === null || interval.max === null) return null;
  return interval.min <= answer && answer <= interval.max;
}

// ─── RENDER: ANSWERS GRID (ADMIN ONLY) ───
function renderAnswersGrid() {
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  for (let p = 0; p < NUM_PROBLEMS; p++) {
    const cell = document.createElement('div');
    cell.className = 'answer-cell';
    cell.innerHTML = `
      <label>P${p + 1}</label>
      <input type="number" step="any" placeholder="Answer" id="ans-${p}"
        value="${state.answers[p] !== null ? state.answers[p] : ''}"
        oninput="onAnswerInput(${p}, this.value)">
    `;
    grid.appendChild(cell);
  }
}

function onAnswerInput(probIdx, val) {
  const num = val === '' ? null : parseFloat(val);
  state.answers[probIdx] = num;
  fbSetAnswer(probIdx, num);
  updateAllStatusDots();
  renderScoreboard();
}

// ─── RENDER: TEAM ADMIN CARDS (ADMIN ONLY) ───
function renderTeamCards() {
  const container = document.getElementById('teamAdminCards');
  container.innerHTML = '';

  for (let t = 0; t < NUM_TEAMS; t++) {
    const card = document.createElement('div');
    card.className = 'team-admin-card';
    card.id = `team-card-${t}`;

    let intervalsHTML = '';
    for (let p = 0; p < NUM_PROBLEMS; p++) {
      const interval = state.teams[t].intervals[p];
      intervalsHTML += `
        <div class="interval-cell">
          <span class="prob-label">P${p + 1}</span>
          <input type="number" step="any" placeholder="min" id="int-${t}-${p}-min"
            value="${interval && interval.min !== null ? interval.min : ''}"
            oninput="onIntervalInput(${t}, ${p}, 'min', this.value)">
          <span class="sep">–</span>
          <input type="number" step="any" placeholder="max" id="int-${t}-${p}-max"
            value="${interval && interval.max !== null ? interval.max : ''}"
            oninput="onIntervalInput(${t}, ${p}, 'max', this.value)">
          <div class="status-dot" id="dot-${t}-${p}"></div>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="team-admin-header" onclick="toggleCard(${t})">
        <span class="team-number">${t + 1}</span>
        <input class="team-name-input" value="${state.teams[t].name}"
          onclick="event.stopPropagation()"
          oninput="onTeamNameInput(${t}, this.value)" placeholder="Team name">
        <span class="collapse-icon">▼</span>
      </div>
      <div class="team-intervals-grid">${intervalsHTML}</div>
    `;
    container.appendChild(card);
  }

  updateAllStatusDots();
}

function toggleCard(t) {
  document.getElementById(`team-card-${t}`).classList.toggle('collapsed');
}

function onTeamNameInput(t, val) {
  const name = val || `Team ${t + 1}`;
  state.teams[t].name = name;
  fbSetTeamName(t, name);
}

function onIntervalInput(teamIdx, probIdx, field, val) {
  const num = val === '' ? null : parseFloat(val);
  let interval = state.teams[teamIdx].intervals[probIdx];

  if (!interval) {
    interval = { min: null, max: null };
    state.teams[teamIdx].intervals[probIdx] = interval;
  }

  interval[field] = num;

  if (interval.min === null && interval.max === null) {
    state.teams[teamIdx].intervals[probIdx] = null;
    fbSetInterval(teamIdx, probIdx, null);
  } else {
    fbSetInterval(teamIdx, probIdx, interval);
  }

  updateStatusDot(teamIdx, probIdx);
}

function updateStatusDot(teamIdx, probIdx) {
  const dot = document.getElementById(`dot-${teamIdx}-${probIdx}`);
  if (!dot) return;
  dot.classList.remove('good', 'bad');

  const interval = state.teams[teamIdx].intervals[probIdx];
  const answer = state.answers[probIdx];

  if (!interval || interval.min === null || interval.max === null || answer === null) return;

  if (interval.min <= answer && answer <= interval.max) {
    dot.classList.add('good');
  } else {
    dot.classList.add('bad');
  }
}

function updateAllStatusDots() {
  for (let t = 0; t < NUM_TEAMS; t++) {
    for (let p = 0; p < NUM_PROBLEMS; p++) {
      updateStatusDot(t, p);
    }
  }
}

// ─── RENDER: SCOREBOARD ───

function renderPlayerScoreboardHead() {
  const thead = document.getElementById('scoreboardHead');
  document.getElementById('scoreboardTable').classList.add('player-view');
  thead.innerHTML = `<tr>
    <th>#</th>
    <th>Team</th>
    <th>Good</th>
    <th>Score</th>
  </tr>`;
}

function renderScoreboard() {
  const tbody = document.getElementById('scoreboardBody');
  if (!tbody) return;

  const ranked = state.teams.map((team, idx) => {
    const { goodCount, score } = calcTeamScore(idx);
    return { idx, name: team.name, goodCount, score };
  });

  ranked.sort((a, b) => a.score - b.score);

  let currentRank = 1;
  for (let i = 0; i < ranked.length; i++) {
    if (i > 0 && ranked[i].score > ranked[i - 1].score) {
      currentRank = i + 1;
    }
    ranked[i].rank = currentRank;
  }

  tbody.innerHTML = '';

  if (MODE === 'player') {
    // Player view: rank, name, good count, score only
    for (const entry of ranked) {
      const tr = document.createElement('tr');
      if (entry.rank <= 3) tr.className = `rank-${entry.rank}`;
      tr.innerHTML = `
        <td><span class="rank-badge">${entry.rank}</span></td>
        <td class="team-name-cell">${escapeHTML(entry.name)}</td>
        <td class="good-count">${entry.goodCount}/${NUM_PROBLEMS}</td>
        <td class="score-cell">${fmtScore(entry.score)}</td>
      `;
      tbody.appendChild(tr);
    }
  } else {
    // Admin view: full detail with intervals
    for (const entry of ranked) {
      const tr = document.createElement('tr');
      if (entry.rank <= 3) tr.className = `rank-${entry.rank}`;

      let probCells = '';
      for (let p = 0; p < NUM_PROBLEMS; p++) {
        const interval = state.teams[entry.idx].intervals[p];
        const good = isGood(entry.idx, p);
        let content = '<span style="color:var(--text-muted)">—</span>';

        if (interval && interval.min !== null && interval.max !== null) {
          const icon = good === true ? '✅' : good === false ? '❌' : '';
          content = `<span class="interval-display">[${fmtNum(interval.min)}, ${fmtNum(interval.max)}]</span>
                     <span class="result-icon">${icon}</span>`;
        }
        probCells += `<td class="prob-cell">${content}</td>`;
      }

      tr.innerHTML = `
        <td><span class="rank-badge">${entry.rank}</span></td>
        <td class="team-name-cell">${escapeHTML(entry.name)}</td>
        ${probCells}
        <td class="good-count">${entry.goodCount}/${NUM_PROBLEMS}</td>
        <td class="score-cell">${fmtScore(entry.score)}</td>
      `;
      tbody.appendChild(tr);
    }
  }
}

// ─── REVEAL ───
function revealScores() {
  const overlay = document.getElementById('revealOverlay');
  const list = document.getElementById('revealList');

  const ranked = state.teams.map((team, idx) => {
    const { goodCount, score } = calcTeamScore(idx);
    return { idx, name: team.name, goodCount, score };
  });
  ranked.sort((a, b) => a.score - b.score);

  let currentRank = 1;
  for (let i = 0; i < ranked.length; i++) {
    if (i > 0 && ranked[i].score > ranked[i - 1].score) currentRank = i + 1;
    ranked[i].rank = currentRank;
  }

  list.innerHTML = '';
  const reversed = [...ranked].reverse();

  reversed.forEach((entry, i) => {
    const li = document.createElement('li');
    li.className = `reveal-item${entry.rank <= 3 ? ` rank-${entry.rank}` : ''}`;
    li.style.animation = `fadeUp 0.5s ${0.3 + i * 0.25}s forwards`;
    li.innerHTML = `
      <span class="reveal-rank">#${entry.rank}</span>
      <span class="reveal-name">${escapeHTML(entry.name)}</span>
      <span class="reveal-score">${fmtScore(entry.score)}</span>
    `;
    list.appendChild(li);
  });

  const closeBtn = document.getElementById('revealCloseBtn');
  closeBtn.style.opacity = '0';
  closeBtn.style.animation = `fadeUp 0.4s ${0.3 + reversed.length * 0.25 + 0.3}s forwards`;

  overlay.classList.add('active');
}

function closeReveal() {
  document.getElementById('revealOverlay').classList.remove('active');
}

// ─── UTILS ───
function fmtNum(n) {
  if (n === null || n === undefined) return '?';
  if (Number.isInteger(n) && Math.abs(n) < 1e6) return n.toLocaleString();
  if (Math.abs(n) >= 1e6) return n.toExponential(2);
  return String(n);
}

function fmtScore(s) {
  return s.toLocaleString();
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── URL PARAM AUTO-CONNECT ───
// If URL has ?room=name&mode=admin|player, auto-connect
(function() {
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  const mode = params.get('mode');

  if (room) {
    document.getElementById('setupRoom').value = room;
  }
  if (mode && (mode === 'admin' || mode === 'player')) {
    setTimeout(() => connectFirebase(mode), 100);
  }
})();
</script>
</body>
</html>
